name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: safepet_user
          POSTGRES_PASSWORD: safepet_secret
          POSTGRES_DB: safepet_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U safepet_user -d safepet_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: safepet_user
      DB_PASSWORD: safepet_secret
      DB_NAME: safepet_db
      JWT_SECRET: ci-secret
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN_DAYS: 7
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: false
      SMTP_USER: ci
      SMTP_PASS: ci
      SMTP_FROM_NAME: PetSafe CI
      SMTP_FROM_EMAIL: ci@example.com
      PASSWORD_RESET_PIN_LENGTH: 6
      PASSWORD_RESET_PIN_EXPIRES_IN_MINUTES: 10
      PASSWORD_RESET_MAX_ATTEMPTS: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run database migrations
        run: npm run migration:run

      - name: Run e2e tests
        run: npm run test:e2e
